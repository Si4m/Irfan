<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ff5ff" />
      <stop offset="100%" stop-color="#ff51fa" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="#1b192e" />
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#neon)" stroke-width="2" filter="url(#glow)" stroke-opacity="0.5" />
  <text x="32" y="44" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="36" fill="url(#neon)" text-anchor="middle" filter="url(#glow)">I</text>
</svg>
